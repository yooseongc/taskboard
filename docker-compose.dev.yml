# Development compose — in-repo Keycloak + GLAuth (LDAP stand-in for AD)
# Usage:
#   cp .env.dev.example .env.dev
#   docker compose -f docker-compose.dev.yml --env-file .env.dev up -d --build
#
# Ports:
#   frontend  -> http://localhost:5174
#   backend   -> http://localhost:8080
#   keycloak  -> http://localhost:8180  (admin / admin)
#   ldap      -> ldap://localhost:3893
#   postgres  -> localhost:5433

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskboard
      POSTGRES_USER: taskboard
      POSTGRES_PASSWORD: taskboard
    ports:
      - "5433:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  ldap:
    image: glauth/glauth:v2.3.0
    ports:
      - "3893:3893"
    volumes:
      - ./infra/glauth/glauth.cfg:/app/config/config.cfg:ro

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      ldap:
        condition: service_started

  backend:
    build:
      context: .
      dockerfile: docker/backend.dev.Dockerfile
    env_file:
      - .env.dev.example
    environment:
      DATABASE_URL: postgres://taskboard:taskboard@postgres:5432/taskboard
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/taskboard
      KEYCLOAK_AUDIENCE: taskboard-backend
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174
      TASKBOARD_DEV_AUTH: "1"
      TASKBOARD_DEV_AUTH_HMAC_KEY: "dev-hmac-key-at-least-32-bytes-long!!"
      SYSTEM_ADMIN_EMAILS: "alice@example.com,admin@example.com"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.dev.Dockerfile
    ports:
      - "5174:80"
    depends_on:
      - backend

volumes:
  pgdata-dev:
