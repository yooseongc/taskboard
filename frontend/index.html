<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Taskboard — 팀 업무 보드 (Kanban · Table · Calendar)" />

    <!-- Brand favicon (SVG, scales cleanly on retina + any size). -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#2563eb" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- PWA: lets Chrome/Edge show "Install app" and opens as its own window;
         Safari/iOS respect apple-mobile-web-app-* for home-screen behavior. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#18181b" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Taskboard" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Taskboard" />

    <title>Taskboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
