<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Taskboard">
  <!-- Background tile, matching brand --color-primary (#2563eb) -->
  <rect width="32" height="32" rx="7" fill="#2563eb"/>

  <!-- Three Kanban columns inside the tile -->
  <rect x="6"  y="8"  width="5" height="16" rx="1.5" fill="#ffffff" opacity="0.95"/>
  <rect x="13.5" y="8"  width="5" height="16" rx="1.5" fill="#ffffff" opacity="0.75"/>
  <rect x="21" y="8"  width="5" height="16" rx="1.5" fill="#ffffff" opacity="0.55"/>

  <!-- Task chip on the leftmost column -->
  <rect x="7" y="10"  width="3" height="2" rx="0.5" fill="#2563eb"/>
  <rect x="7" y="13"  width="3" height="2" rx="0.5" fill="#2563eb" opacity="0.5"/>
</svg>
