# Production compose — assumes external Keycloak + AD
# Usage:
#   cp .env.example .env        # fill in required values
#   docker compose up -d --build
#
# Required env (see .env.example for the full list):
#   POSTGRES_PASSWORD, KEYCLOAK_ISSUER, CORS_ALLOWED_ORIGINS, VITE_KEYCLOAK_URL

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskboard
      POSTGRES_USER: ${POSTGRES_USER:-taskboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskboard}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-taskboard}:${POSTGRES_PASSWORD}@postgres:5432/taskboard
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:?Set KEYCLOAK_ISSUER}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-taskboard-backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?Set CORS_ALLOWED_ORIGINS}
      BACKEND_BIND_ADDR: 0.0.0.0:8080
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      SYSTEM_ADMIN_EMAILS: ${SYSTEM_ADMIN_EMAILS:-admin@example.com}
      OIDC_DEPT_CLAIM: ${OIDC_DEPT_CLAIM:-groups}
      OIDC_DEPT_SYNC_ENABLED: ${OIDC_DEPT_SYNC_ENABLED:-true}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:?Set VITE_KEYCLOAK_URL}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-taskboard}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-taskboard-frontend}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
