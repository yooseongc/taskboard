# =============================================================================
# GLAuth configuration — Dev AD/LDAP simulator
# =============================================================================
# Base DN: dc=taskboard,dc=local
# Admin bind: cn=serviceaccount,dc=taskboard,dc=local / glauth-admin
#
# Groups map to Departments/Teams:
#   engineering (GID 5001) → Engineering department
#   design      (GID 5002) → Design department
#   management  (GID 5003) → Management department

[ldap]
  enabled = true
  listen = "0.0.0.0:3893"

[ldaps]
  enabled = false

[backend]
  datastore = "config"
  baseDN = "dc=taskboard,dc=local"

# =============================================================================
# Service Account — Keycloak uses this to bind and search
# =============================================================================
[[users]]
  name = "serviceaccount"
  mail = "service@taskboard.local"
  uidnumber = 9999
  primarygroup = 9999
  passsha256 = "7230c5fc062a258804707b7ccbd516b2f34dc6068c935879c29d478678437635"
  # password: glauth-admin
  [[users.capabilities]]
    action = "search"
    object = "*"

