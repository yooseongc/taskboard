# =============================================================================
# GLAuth configuration — Dev AD/LDAP simulator
# =============================================================================
# Base DN: dc=taskboard,dc=local
# Admin bind: cn=serviceaccount,dc=taskboard,dc=local / glauth-admin
#
# Groups (Departments):
#   engineering    (GID 5001)
#   eng-backend    (GID 5011) — sub-team of engineering
#   eng-frontend   (GID 5012) — sub-team of engineering
#   design         (GID 5002)
#   design-ux      (GID 5021) — sub-team of design
#   management     (GID 5003)
#   qa             (GID 5004)
#
# All user passwords: secret
# passsha256 of "secret" = 2bb80d537b1da3e38bd30361aa855686bde0eacd7162fef6a25fe97bf527a25b

[ldap]
  enabled = true
  listen = "0.0.0.0:3893"

[ldaps]
  enabled = false

[backend]
  datastore = "config"
  baseDN = "dc=taskboard,dc=local"

# =============================================================================
# Service Account — Keycloak bind user
# =============================================================================
[[users]]
  name = "serviceaccount"
  mail = "service@taskboard.local"
  uidnumber = 9999
  primarygroup = 9999
  passsha256 = "7230c5fc062a258804707b7ccbd516b2f34dc6068c935879c29d478678437635"
  # password: glauth-admin
  [[users.capabilities]]
    action = "search"
    object = "*"

