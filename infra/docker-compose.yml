version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskboard
      POSTGRES_USER: taskboard
      POSTGRES_PASSWORD: taskboard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ..
      dockerfile: infra/backend.Dockerfile
    env_file:
      - env.example
    environment:
      DATABASE_URL: postgres://taskboard:taskboard@postgres:5432/taskboard
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/taskboard
      KEYCLOAK_AUDIENCE: taskboard-backend
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      TASKBOARD_DEV_AUTH: "1"
      TASKBOARD_DEV_AUTH_HMAC_KEY: "dev-hmac-key-at-least-32-bytes-long!!"
      SEED_ON_START: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: infra/frontend.Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
